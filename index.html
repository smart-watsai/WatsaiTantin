  <style>
    /* ทำให้ Iframe เต็มจอ 100% โดยไม่มีขอบขาว */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: #f4f7fa; /* สีพื้นหลังเดียวกับระบบ */
    }
    iframe {
      border: none;
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
